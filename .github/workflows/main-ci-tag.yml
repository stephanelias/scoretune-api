name: Main CI & Auto Tag

on:
  push:
    branches:
      - main

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      maven-cache-hit: ${{ steps.cache-maven.outputs.cache-hit }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Java 21 (Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Cache Maven dependencies
        id: cache-maven
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Prepare dependencies
        run: mvn dependency:go-offline

      - name: Upload Maven repository
        uses: actions/upload-artifact@v4
        with:
          name: m2-repo-main
          path: ~/.m2/repository

  test:
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Maven repository
        uses: actions/download-artifact@v4
        with:
          name: m2-repo-main
          path: ~/.m2/repository

      - name: Setup Java 21 (Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Docker for Testcontainers
        run: |
          docker info
          sudo chmod 666 /var/run/docker.sock

      - name: Run Unit Tests
        run: mvn test

  build:
    needs: [setup, test]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Maven repository
        uses: actions/download-artifact@v4
        with:
          name: m2-repo-main
          path: ~/.m2/repository

      - name: Setup Java 21 (Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Build Application JAR
        run: mvn clean package -DskipTests

      - name: Extract Project Version
        id: extract-version
        run: echo "version=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)" >> $GITHUB_OUTPUT

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-jar-main
          path: target/*.jar

  create-tag:
    needs: [setup, test, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Java 21 (Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Configure Git
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git

      - name: Detect type from commit message (Conventional Commits)
        id: detect-type
        run: |
          COMMIT_MSG="${{ github.event.head_commit.message }}"
          echo "Commit message: $COMMIT_MSG"
          
          # Extraire le type depuis le format Conventional Commits: feat(...), fix(...), chore(...)
          if [[ "$COMMIT_MSG" =~ ^(feat|fix|chore)\(.*\) ]]; then
            BRANCH_PREFIX="${BASH_REMATCH[1]}"
          elif [[ "$COMMIT_MSG" =~ ^(feat|fix|chore): ]]; then
            BRANCH_PREFIX="${BASH_REMATCH[1]}"
          else
            # Pas de préfixe reconnu = MAJOR
            BRANCH_PREFIX="none"
          fi
          
          # Déterminer le release_type pour Maven
          case "$BRANCH_PREFIX" in
            feat|chore)
              RELEASE_TYPE="minor"
              ;;
            fix)
              RELEASE_TYPE="patch"
              ;;
            *)
              RELEASE_TYPE="major"
              ;;
          esac
          
          echo "release_type=$RELEASE_TYPE" >> $GITHUB_OUTPUT
          echo "🏷️ Detected release type: $RELEASE_TYPE (from branch: $BRANCH_PREFIX)"

      - name: Compute next version
        id: version
        run: |
          CUR=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
          BASE=${CUR%-SNAPSHOT}
          IFS='.' read -r MAJ MIN PAT <<< "$BASE"
          
          case "${{ steps.detect-type.outputs.release_type }}" in
          major)
           MAJ=$((MAJ+1)); MIN=0; PAT=0 ;;
          minor)
           MIN=$((MIN+1)); PAT=0 ;;
          *)
           PAT=$((PAT+1)) ;;
          esac
          
          echo "release=$MAJ.$MIN.$PAT" >> $GITHUB_ENV
          echo "next_snapshot=$MAJ.$MIN.$((PAT+1))-SNAPSHOT" >> $GITHUB_ENV
          
          echo "📦 Release version: $MAJ.$MIN.$PAT"
          echo "🔄 Next snapshot: $MAJ.$MIN.$((PAT+1))-SNAPSHOT"

      - name: Pull latest changes
        run: git pull --rebase origin main

      - name: Maven Release Prepare
        run: |
          mvn release:prepare -B \
            -DreleaseVersion=${{ env.release }} \
            -DdevelopmentVersion=${{ env.next_snapshot }} \
            -DpushChanges=true \
            -DscmCommentPrefix="[skip ci] Release: "

      - name: Maven Release Perform
        run: mvn release:perform -B -Darguments="-Dmaven.deploy.skip=true"

      - name: Push Tags
        run: git push --follow-tags
