name: Release & Deploy

on:
  release:
    types: [created]

jobs:
  build-artifact:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Setup Java 21 (Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Build Release JAR
        run: mvn clean package -DskipTests

      - name: Extract Project Version
        id: extract-version
        run: echo "version=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)" >> $GITHUB_OUTPUT

      - name: Upload JAR to Release
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: ./target/scoretune-api-${{ steps.extract-version.outputs.version }}.jar
          asset_name: scoretune-api-${{ github.event.release.tag_name }}.jar
          asset_content_type: application/java-archive

      - name: Upload artifact for deploy
        uses: actions/upload-artifact@v4
        with:
          name: release-jar
          path: target/*.jar

  deploy:
    needs: build-artifact
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://scoretune-api.fly.dev
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Download release artifact
        uses: actions/download-artifact@v4
        with:
          name: release-jar
          path: ./target

      - name: Setup Fly.io CLI
        run: curl -L https://fly.io/install.sh | sh

      - name: Deploy to Fly.io
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          ~/.fly/bin/flyctl deploy --remote-only --build-arg APP_VERSION=${{ github.event.release.tag_name }}
          echo "✅ Deployed version ${{ github.event.release.tag_name }} to Fly.io"
